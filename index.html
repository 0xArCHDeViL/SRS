<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nihongo Qubit SRS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: "#09090b", // Pure Zinc-950 for deep OLED blacks
                        foreground: "#fafafa",
                        card: "#18181b",
                        "card-foreground": "#fafafa",
                        border: "#27272a",
                        primary: "#fafafa",
                        "primary-foreground": "#18181b",
                        muted: "#27272a",
                        "muted-foreground": "#a1a1aa",
                        destructive: "#ef4444",
                        success: "#10b981",
                        warning: "#f59e0b",
                        info: "#3b82f6"
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        jp: ['"Noto Sans JP"', '"Hiragino Kaku Gothic Pro"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-background text-foreground font-sans antialiased min-h-[100dvh] flex flex-col overscroll-y-none">

    <nav class="sticky top-0 z-50 border-b border-border bg-background/90 backdrop-blur-xl">
        <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3 btn-press cursor-pointer group btn-home">
                <div class="w-7 h-7 rounded bg-primary text-primary-foreground flex items-center justify-center">
                    <i data-lucide="cpu" class="w-4 h-4"></i>
                </div>
                <h1 class="font-bold tracking-tight text-base">Qubit<span class="text-muted-foreground font-normal">SRS</span></h1>
            </div>
            
            <div class="flex items-center gap-1.5 bg-card border border-border px-3 py-1 rounded-full text-xs font-medium shadow-sm">
                <i data-lucide="inbox" class="w-3 h-3 text-warning"></i>
                <span id="nav-due-count" class="text-foreground">0</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-4xl mx-auto p-4 sm:p-6 flex flex-col relative">
        
        <div id="view-dashboard" class="flex-col gap-6 animate-in flex pb-10">
            <header class="space-y-1">
                <h2 class="text-2xl font-extrabold tracking-tight">Kontrol Matriks</h2>
                <p class="text-muted-foreground text-sm leading-relaxed">Seleksi pangkalan data dan parameter evaluasi.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <!-- Deck Selector -->
                <div class="md:col-span-7 space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xs font-bold text-muted-foreground uppercase tracking-widest">Pangkalan Data</h3>
                        <button id="btn-select-all" class="text-xs font-bold text-info btn-press">Pilih Semua</button>
                    </div>
                    <div id="deck-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                </div>

                <!-- Settings Block -->
                <div class="md:col-span-5 bg-card border border-border p-5 rounded-2xl space-y-5 h-fit">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-muted-foreground uppercase tracking-wider">Mode UI</label>
                        <div class="flex p-1 bg-background rounded-lg border border-border">
                            <button class="setting-btn active" data-type="mode" data-val="flashcard">Flashcard</button>
                            <button class="setting-btn" data-type="mode" data-val="quiz">Kuis 6-Opt</button>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-muted-foreground uppercase tracking-wider">Arah Logika</label>
                        <div class="flex p-1 bg-background rounded-lg border border-border">
                            <button class="setting-btn active" data-type="direction" data-val="forward">JP ➔ ID</button>
                            <button class="setting-btn" data-type="direction" data-val="reverse">ID ➔ JP</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-muted-foreground uppercase tracking-wider">Limitasi Entitas</label>
                        <select id="setting-limit" class="custom-select w-full bg-background border border-border rounded-lg px-3 py-2.5 text-sm font-medium outline-none focus:ring-1 focus:ring-primary">
                            <option value="10">10 Kartu (Ringan)</option>
                            <option value="20" selected>20 Kartu (Standar)</option>
                            <option value="50">50 Kartu (Intensif)</option>
                            <option value="all">Tanpa Batas</option>
                        </select>
                    </div>

                    <button id="btn-start" class="w-full bg-primary text-primary-foreground font-bold py-3 rounded-xl btn-press mt-2">
                        Eksekusi Sesi <i data-lucide="play" class="w-4 h-4 inline ml-1"></i>
                    </button>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="mt-4 flex items-center justify-between p-4 rounded-xl border border-destructive/20 bg-destructive/5">
                <div>
                    <h4 class="font-bold text-sm text-destructive">Wipe Memory</h4>
                    <p class="text-xs text-muted-foreground">Reset total algoritma.</p>
                </div>
                <button id="btn-wipe" class="text-xs font-bold bg-destructive text-white px-3 py-1.5 rounded-md btn-press">Reset</button>
            </div>
        </div>

        <div id="view-flashcard" class="hidden flex-col items-center w-full max-w-lg mx-auto mt-2 animate-in">
            <!-- Header Progress -->
            <div class="w-full flex justify-between items-center mb-6">
                <button class="btn-home text-muted-foreground hover:text-primary"><i data-lucide="x" class="w-5 h-5"></i></button>
                <div class="flex gap-2 items-center">
                    <div id="fc-prio" class="hidden items-center gap-1 text-[10px] font-bold text-destructive bg-destructive/10 px-2 py-1 rounded border border-destructive/20"></div>
                    <div class="text-xs font-mono bg-muted px-2 py-1 rounded text-muted-foreground border border-border" id="fc-prog"></div>
                </div>
            </div>

            <!-- Card UI -->
            <div class="perspective-1000 w-full aspect-[4/3]" id="fc-area">
                <div class="w-full h-full relative transform-style-3d will-change-transform" id="fc-inner">
                    <!-- Front -->
                    <div class="absolute inset-0 backface-hidden bg-card border border-border rounded-3xl flex flex-col items-center justify-center p-6 shadow-xl">
                        <span id="fc-tag" class="absolute top-5 text-[10px] font-bold text-muted-foreground tracking-widest uppercase"></span>
                        <h2 id="fc-q" class="text-6xl sm:text-8xl font-black text-primary font-jp"></h2>
                        <span id="fc-hint" class="absolute bottom-5 text-xs text-muted-foreground animate-pulse">Tap untuk flip</span>
                    </div>
                    <!-- Back -->
                    <div class="absolute inset-0 backface-hidden rotate-y-180 bg-muted border-t-4 border-t-primary rounded-3xl flex flex-col items-center justify-center p-6 shadow-xl">
                        <h3 id="fc-kana" class="text-3xl sm:text-4xl font-bold text-primary font-jp mb-4"></h3>
                        <div class="w-12 h-px bg-border mb-4"></div>
                        <p id="fc-a" class="text-xl sm:text-2xl text-muted-foreground text-center capitalize"></p>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div id="fc-actions" class="w-full grid grid-cols-4 gap-2 mt-6 opacity-0 pointer-events-none transition-all duration-200">
                <button class="grade-btn border-destructive/30 hover:bg-destructive/10 text-destructive btn-press" data-q="0">
                    <span class="font-bold text-sm">Lupa</span><span class="text-[10px] opacity-70 mt-0.5">1m</span>
                </button>
                <button class="grade-btn border-warning/30 hover:bg-warning/10 text-warning btn-press" data-q="1">
                    <span class="font-bold text-sm">Sulit</span><span id="fc-t-hard" class="text-[10px] opacity-70 mt-0.5"></span>
                </button>
                <button class="grade-btn border-success/30 hover:bg-success/10 text-success btn-press" data-q="2">
                    <span class="font-bold text-sm">Ingat</span><span id="fc-t-good" class="text-[10px] opacity-70 mt-0.5"></span>
                </button>
                <button class="grade-btn border-info/30 hover:bg-info/10 text-info btn-press" data-q="3">
                    <span class="font-bold text-sm">Mudah</span><span id="fc-t-easy" class="text-[10px] opacity-70 mt-0.5"></span>
                </button>
            </div>
        </div>

        <div id="view-quiz" class="hidden flex-col w-full max-w-2xl mx-auto mt-2 animate-in">
            <div class="w-full flex justify-between items-center mb-4">
                <button class="btn-home text-muted-foreground hover:text-primary"><i data-lucide="x" class="w-5 h-5"></i></button>
                <div class="flex gap-2 items-center">
                    <div id="qz-prio" class="hidden items-center gap-1 text-[10px] font-bold text-destructive bg-destructive/10 px-2 py-1 rounded border border-destructive/20"></div>
                    <div class="text-xs font-mono bg-muted px-2 py-1 rounded text-muted-foreground border border-border" id="qz-prog"></div>
                </div>
            </div>

            <!-- Quiz Q -->
            <div class="w-full bg-card border border-border rounded-3xl p-8 sm:p-12 flex flex-col items-center justify-center shadow-lg relative mb-6">
                <span id="qz-tag" class="absolute top-4 text-[10px] font-bold text-muted-foreground tracking-widest uppercase"></span>
                <h2 id="qz-q" class="text-5xl sm:text-7xl font-black text-primary font-jp text-center leading-tight"></h2>
                <p id="qz-q-sub" class="text-lg text-muted-foreground mt-4 font-jp hidden"></p>
            </div>

            <!-- Quiz Opts -->
            <div id="qz-opts" class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full"></div>

            <div id="qz-next-zone" class="w-full flex justify-end mt-6 opacity-0 pointer-events-none transition-opacity duration-200">
                <button id="btn-quiz-next" class="bg-primary text-primary-foreground font-bold px-8 py-3 rounded-xl btn-press flex items-center gap-2">
                    Lanjut <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div id="view-complete" class="hidden flex-col items-center justify-center py-24 animate-in text-center">
            <div class="w-20 h-20 bg-success/10 text-success rounded-full flex items-center justify-center mb-6">
                <i data-lucide="check-check" class="w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-black mb-2">Matriks Selesai</h2>
            <p class="text-muted-foreground text-sm mb-8">Tidak ada entitas *overdue* di memori Anda saat ini.</p>
            <button class="btn-home bg-card border border-border px-6 py-2.5 rounded-lg text-sm font-bold btn-press">Kembali ke Dashboard</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
